<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Accedi alla ricerca targhe</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      max-width: 600px;
      text-align: center;
    }
    input, button {
      padding: 8px;
      margin: 5px 0;
      width: 100%;
    }
    button {
      background: #0066cc;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #004c99;
    }
    #passwordForm, #searchPage {
      display: none;
    }
    #errorPass {
      color: #721c24;
      margin: 10px 0;
      display: none;
    }
    #result {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 5px;
      white-space: pre-line;
    }
    .found { background: #d4edda; color: #155724; }
    .not-found { background: #f8d7da; color: #721c24; }
    .error { background: #fff3cd; color: #856404; }
    .search-info { font-size: 0.9em; color: #666; margin-bottom: 10px; }
  </style>
</head>
<body>

  <!-- SCHERMATA PASSWORD -->
  <div id="passwordForm">
    <h1>Accedi alla ricerca targhe</h1>
    <p>Inserisci la password per accedere</p>
    <input id="passInput" type="password" placeholder="Password" />
    <div id="errorPass">Password errata</div>
    <button onclick="checkPassword()">Accedi</button>
  </div>

  <!-- PAGINA DI RICERCA -->
  <div id="searchPage" style="display: none;">
    <h1>Cerca per targa o per testo GSA per GSRail BAC -</h1>

    <p class="search-info">
      Inserisci una targa o una parte di testo (es. "AB123", "COGNOME", ecc.).<br>
      La ricerca è parziale, case‑insensitive e avviene in tutti i fogli e tutte le celle.
    </p>

    <label>Testo da cercare (anche parziale):</label><br/>
    <input id="searchInput" type="text" placeholder="AB123 o COGNOME" />

    <br/>
    <button onclick="cercaTesto()">Cerca nel file</button>

    <div id="result"></div>
  </div>

  <script>
    const PASSWORD_CORRETTA = "grandistazionibari";

    // Alla apertura, mostra solo il form password
    window.onload = function() {
      document.getElementById("passwordForm").style.display = "block";
      document.getElementById("searchPage").style.display = "none";
    };

    function checkPassword() {
      const pass = document.getElementById("passInput").value.trim();
      const errorEl = document.getElementById("errorPass");

      if (pass === PASSWORD_CORRETTA) {
        document.getElementById("passwordForm").style.display = "none";
        document.getElementById("searchPage").style.display = "block";
      } else {
        errorEl.style.display = "block";
      }
    }

    // Usa il file locale nel repo (servito da GitHub Pages)
    const EXCEL_URL = "FSPark.xlsx";

    async function cercaTesto() {
      const resultEl = document.getElementById("result");
      resultEl.className = "";
      resultEl.textContent = "Caricamento file e ricerca in corso...";

      const searchText = document.getElementById("searchInput").value.trim().toUpperCase();

      if (!searchText) {
        resultEl.className = "error";
        resultEl.textContent = "Manca il testo da cercare.";
        return;
      }

      try {
        const res = await fetch(EXCEL_URL);
        if (!res.ok) throw new Error("Errore download file Excel: " + res.status);

        const data = await res.arrayBuffer();
        const wb = XLSX.read(data, { type: "array" });

        let matchCount = 0;
        let results = [];

        wb.SheetNames.forEach(sheetName => {
          const ws = wb.Sheets[sheetName];

          for (const cellRef in ws) {
            if (cellRef[0] === "!") continue; // ignora metadati
            const cell = ws[cellRef];
            if (!cell || cell.v === undefined) continue;

            const cellText = (cell.w || cell.v).toString().toUpperCase();
            if (cellText.includes(searchText)) {
              matchCount++;
              results.push({
                sheet: sheetName,
                cellRef,
                text: cell.w || cell.v,
              });
            }
          }
        });

        if (matchCount > 0) {
          resultEl.className = "found";
          const first = results[0];
          const last = results[results.length - 1];

          let msg = `✅ TROVATO: ${matchCount} corrispondenza(i) per "${searchText}"\n\n`;
          msg += `Prima corrispondenza:\n  Foglio: ${first.sheet} → cella ${first.cellRef} → "${first.text}"\n`;

          if (results.length > 1) {
            msg += `\nUltima corrispondenza:\n  Foglio: ${last.sheet} → cella ${last.cellRef} → "${last.text}"`;
          }

          resultEl.textContent = msg;

          console.log("Tutte le celle trovate:", results);

        } else {
          resultEl.className = "not-found";
          resultEl.textContent =
            `❌ NON trovata nessuna cella con "${searchText}" in nessun foglio.\n` +
            `Fogli presenti: ` + wb.SheetNames.join(", ");
        }
      } catch (err) {
        resultEl.className = "error";
        resultEl.textContent = "Errore: " + err.message;
        console.error(err);
      }
    }
  </script>
</body>
</html>
